<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup Page</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="form-section">
      <h1>Get Started Now</h1>
      <form id="signup-form">
        <div class="input-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Enter your name" required>
        </div>
        <div class="input-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" required>
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>
        <div class="checkbox-group">
          <input type="checkbox" id="terms" name="terms" required>
          <label for="terms">I agree to the <a href="#">terms & policy</a></label>
        </div>
        <button type="submit" class="btn">Signup</button>
        <div class="divider">
          <span>or</span>
        </div>
        <div class="social-login">
          <button type="button" class="google-btn">Sign in with Google</button>
          <button type="button" class="apple-btn">Sign in with Apple</button>
        </div>
        <p class="login-link">Have an account? <a href="#">Sign in</a></p>
      </form>
    </div>
    <div class="branding-section">
      <img src="pic.png" alt="Peer Picks Logo" class="logo">
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
