<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PeerPicks - Signup</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- Left Section: Signup Form -->
    <div class="signup-form">
      <h1>Get Started Now</h1>
      <form>
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Enter your name" required>

        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="Enter your email" required>

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>

        <div class="terms">
          <input type="checkbox" id="terms" required>
          <label for="terms">I agree to the terms & policy</label>
        </div>

        <button type="submit" class="btn signup-btn">Signup</button>

        <div class="or-divider">Or</div>

        <div class="social-login">
          <button class="btn google-btn">Sign in with Google</button>
          <button class="btn apple-btn">Sign in with Apple</button>
        </div>

        <p class="signin-link">
          Have an account? <a href="#">Sign In</a>
        </p>
      </form>
    </div>

    <!-- Right Section: Logo -->
    <div class="logo-section">
      <img src="pic.png" alt="PeerPicks Logo">
    </div>
  </div>
</body>
</html>
